name: SessionTimer
options:
  bundleIdPrefix: me.melkor
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: SW7BAJUMAC
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
    CLANG_ENABLE_EXPLICIT_MODULES: "NO"

targets:
  SessionTimer:
    type: application
    platform: iOS
    sources:
      - path: src/App
        excludes:
          - "**/.DS_Store"
      - path: src/Models
        optional: true
      - path: src/Views
        optional: true
      - path: src/ViewModels
        optional: true
      - path: src/Services
        optional: true
      - path: src/Extensions
        optional: true
      - path: src/Shared
        optional: true
      - path: src/Resources
        optional: true
      - path: vendor/matcha-icefall-zh-en
        type: folder
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.melkor.SessionTimer
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/src/CModules/SherpaOnnx"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Session Timer
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIBackgroundModes: audio
    entitlements:
      path: src/App/SessionTimer.entitlements
    dependencies:
      - target: SessionTimerWidgets
        embed: true
      - framework: vendor/sherpa-onnx.xcframework
        embed: false
      - framework: vendor/ios-onnxruntime/onnxruntime.xcframework
        embed: false
      - sdk: Accelerate.framework
      - sdk: CoreML.framework
      - sdk: libc++.tbd

  SessionTimerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: src-widgets
        excludes:
          - "**/.DS_Store"
      - path: src/Shared
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.melkor.SessionTimer.widgets
        SKIP_INSTALL: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: src-widgets/Info.plist
      properties:
        CFBundleDisplayName: SessionTimer Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  SessionTimer:
    build:
      targets:
        SessionTimer: all
        SessionTimerWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
