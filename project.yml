name: SessionTimer
options:
  bundleIdPrefix: me.melkor
  deploymentTarget:
    iOS: "16.1"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: SW7BAJUMAC
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: false
    IPHONEOS_DEPLOYMENT_TARGET: "16.1"
    CODE_SIGN_STYLE: Automatic

targets:
  SessionTimer:
    type: application
    platform: iOS
    sources:
      - path: src/App
        excludes:
          - "**/.DS_Store"
      - path: src/Models
        optional: true
      - path: src/Views
        optional: true
      - path: src/ViewModels
        optional: true
      - path: src/Services
        optional: true
      - path: src/Extensions
        optional: true
      - path: src/Shared
        optional: true
      - path: src/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.melkor.SessionTimer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Session Timer
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    entitlements:
      path: src/App/SessionTimer.entitlements
    dependencies:
      - target: SessionTimerWidgets
        embed: true

  SessionTimerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: src-widgets
        excludes:
          - "**/.DS_Store"
      - path: src/Shared
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.melkor.SessionTimer.widgets
        SKIP_INSTALL: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: src-widgets/Info.plist
      properties:
        CFBundleDisplayName: SessionTimer Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

schemes:
  SessionTimer:
    build:
      targets:
        SessionTimer: all
        SessionTimerWidgets: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
